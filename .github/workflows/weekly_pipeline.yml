name: Weekly Recession Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fredapi pandas numpy scikit-learn mlflow prefect \
                      streamlit python-dotenv plotly altair joblib

      - name: Create data directories
        run: mkdir -p data/raw data/processed models

      - name: Run fetch
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m pipeline.fetch_data

      - name: Run feature engineering
        run: python -m pipeline.engineer_features

      - name: Run scoring
        run: python -m pipeline.score_current

      - name: Commit updated data and scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/scores.csv data/processed/current_snapshot.json data/processed/features.csv data/raw/fred_raw.csv
          git diff --staged --quiet || git commit -m "Auto: weekly pipeline run $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push